name: DynamicIsland
options:
  bundleIdPrefix: com.workview
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.35"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "$(ARCHS_STANDARD)"
targets:
  DynamicIsland:
    type: application
    platform: macOS
    sources:
      - path: DynamicIsland
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.workview.DynamicIsland
        INFOPLIST_FILE: DynamicIsland/Info.plist
        CODE_SIGN_ENTITLEMENTS: DynamicIsland/DynamicIsland.entitlements
        PRODUCT_NAME: DynamicIsland
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: DynamicIsland/DynamicIsland.entitlements
