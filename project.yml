name: SuperIsland
options:
  bundleIdPrefix: com.workview
  deploymentTarget:
    macOS: "14.0"
  minimumXcodeGenVersion: "2.35"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: "$(ARCHS_STANDARD)"
packages:
  Aptabase:
    url: https://github.com/aptabase/aptabase-swift
    from: "0.3.0"
targets:
  SuperIsland:
    type: application
    platform: macOS
    sources:
      - path: SuperIsland
        excludes:
          - "**/.DS_Store"
      - path: ExtensionHost
        excludes:
          - "**/.DS_Store"
          - "**/*.md"
    dependencies:
      - package: Aptabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.workview.SuperIsland
        INFOPLIST_FILE: SuperIsland/Info.plist
        CODE_SIGN_ENTITLEMENTS: SuperIsland/SuperIsland.entitlements
        PRODUCT_NAME: SuperIsland
        MARKETING_VERSION: "1.0.3"
        CURRENT_PROJECT_VERSION: "4"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
    entitlements:
      path: SuperIsland/SuperIsland.entitlements
      properties:
        com.apple.security.personal-information.calendars: true
        com.apple.security.personal-information.location: true
        com.apple.security.automation.apple-events: true
    postCompileScripts:
      - name: "Copy Built-in Extensions"
        basedOnDependencyAnalysis: false
        script: |
          DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/BundledExtensions"
          mkdir -p "$DEST"

          # Pre-bundle WhatsApp provider with esbuild so node_modules aren't needed at runtime
          WA_PROVIDER="${SRCROOT}/Extensions/whatsapp-web/provider"
          if [ -d "${WA_PROVIDER}/node_modules" ]; then
            echo "Bundling WhatsApp provider with esbuild..."
            npx --yes esbuild \
              "${WA_PROVIDER}/index.mjs" \
              --bundle \
              --platform=node \
              --format=cjs \
              --outfile="${WA_PROVIDER}/bundle.cjs" 2>&1 && echo "esbuild: done" || echo "esbuild: failed (will use index.mjs)"
          fi

          for ext in ai-usage pomodoro whatsapp-web agents-status linear-mentions; do
            SRC="${SRCROOT}/Extensions/${ext}"
            if [ -d "$SRC" ]; then
              rsync -a --delete \
                --exclude="node_modules/" \
                --exclude=".DS_Store" \
                --exclude="__pycache__/" \
                "${SRC}/" "${DEST}/${ext}/"
            fi
          done
